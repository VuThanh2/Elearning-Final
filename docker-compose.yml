version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: mongo_lms
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - backend_net
    ports:
    - "27017:27017"
    #Production: xoá ports, không expose port ra ngoài

  redis:
    image: redis:7
    container_name: redis_lms
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - backend_net
    ports:
    - "6379:6379"
    #Production: xoá ports, không expose port ra ngoài

  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_lms
    restart: always
    environment:
      ORACLE_PASSWORD: ${ORACLE_SYS_PASSWORD}
      APP_USER: ${ORACLE_USER}
      APP_USER_PASSWORD: ${ORACLE_PASSWORD}
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - backend_net
    ports:
    - "1521:1521"
    #Production: xoá ports, không expose port ra ngoài

networks:
  backend_net:
    driver: bridge

volumes:
  mongo_data:
  oracle_data: